apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiocrm-backend-deployment
  labels:
    app: axiocrm-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axiocrm-backend
  template:
    metadata:
      labels:
        app: axiocrm-backend
    spec:
      automountServiceAccountToken: false 
      imagePullSecrets:
      - name: ghcr-secret
      initContainers:
      - name: wait-for-db
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z axiocrm-db-service 1433; do echo waiting for db; sleep 2; done;']
      containers:
      - name: axiocrm-api
        image: ghcr.io/oumaima-benabdallah/axiocrm-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:                          
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: axiocrm-secrets
              key: ConnectionStrings__DefaultConnection
        - name: Jwt__Key
          valueFrom:
            secretKeyRef:
              name: axiocrm-secrets
              key: Jwt__Key
        - name: Jwt__Issuer
          valueFrom:
            secretKeyRef:
              name: axiocrm-secrets
              key: Jwt__Issuer
        - name: Jwt__Audience
          value: "http://localhost:4200"
        - name: Smtp__Host
          value: "smtp.gmail.com"
        - name: Smtp__Port
          value: "587"
        - name: Smtp__Username
          valueFrom:                        
            secretKeyRef:
              name: axiocrm-secrets
              key: Smtp__Username
        - name: Smtp__Password
          valueFrom:                       
            secretKeyRef:
              name: axiocrm-secrets
              key: Smtp__Password
        - name: Smtp__From
          valueFrom:
            secretKeyRef:
              name: axiocrm-secrets
              key: Smtp__Username
        - name: Smtp__EnableSsl
          value: "true"
        - name: Frontend__ResetPasswordUrl
          value: "http://localhost:4200/reset-password"
---
apiVersion: v1
kind: Service
metadata:
  name: axiocrm-backend-service
spec:
  type: NodePort
  selector:
    app: axiocrm-backend
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080