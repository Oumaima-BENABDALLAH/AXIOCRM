apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiocrm-db-deployment
  labels:
    app: axiocrm-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: axiocrm-db
  template:
    metadata:
      labels:
        app: axiocrm-db
    spec:
      automountServiceAccountToken: false 
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
        ports:
        - containerPort: 1433
        resources:                          
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
            ephemeral-storage: "1Gi"  
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: MSSQL_SA_PASSWORD
          valueFrom:                       
            secretKeyRef:
              name: axiocrm-secrets
              key: MSSQL_SA_PASSWORD
        volumeMounts:
        - name: mssql-storage
          mountPath: /var/opt/mssql # Chemin où SQL Server stocke les données
      volumes:
      - name: mssql-storage
        persistentVolumeClaim:
          claimName: mssql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: axiocrm-db-service
spec:
  type: ClusterIP # Ce service est interne, seul ton API pourra le voir
  selector:
    app: axiocrm-db
  ports:
    - port: 1433
      targetPort: 1433